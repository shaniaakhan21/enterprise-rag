version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: enterprise-rag-api
    ports:
      - "8000:8000"
    volumes:
      # Mount data folder so index persists between container restarts
      - ./data:/app/data
      # Mount .env file for secrets
      - ./.env:/app/.env:ro
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s